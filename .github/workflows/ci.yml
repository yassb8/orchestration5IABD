# CI — Prediction de l'abandon scolaire
#
# Declenche sur push, pull_request et lancement manuel.
# Jobs :
#   1. quality : lint (ruff) + types (mypy) + tests (pytest)
#   2. train   : baseline LogReg sans MLflow, publie model.joblib en artefact

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Qualite : lint + types + tests
  # ---------------------------------------------------------------------------
  quality:
    name: Qualite (lint + types + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dependances (projet + dev)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src

      - name: Types (mypy)
        run: uv run mypy src

      - name: Tests (pytest)
        run: uv run pytest --tb=short

  # ---------------------------------------------------------------------------
  # 2. Entrainement : baseline LogReg -> models/model.joblib
  # ---------------------------------------------------------------------------
  train:
    name: Entrainement (Continuous Training)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dependances
        run: uv sync

      - name: Entrainement de la baseline (sans MLflow)
        run: uv run python -m src.train
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Publication du modele en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
          retention-days: 7
