# Seance 14 - TP docker-compose : orchestrez votre stack de classification.
# Squelette a completer (marqueurs TODO S14-n). Voir tp/TP_S14_docker_compose.md.
#
# Services : mlflow (suivi), train (entrainement one-shot, profil "train"),
#            api (FastAPI) et frontend (Streamlit).
#
# Commandes (depuis la racine du projet) :
#   docker compose -f todo/docker-compose.yml up -d mlflow
#   docker compose -f todo/docker-compose.yml --profile train run --rm train
#   docker compose -f todo/docker-compose.yml up -d api frontend
#   -> API sur http://localhost:8000, frontend sur http://localhost:8501

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  train:
    build:
      context: .
      dockerfile: todo/docker/Dockerfile.train
    # Entraine et ecrit models/model.joblib dans le volume partage models_data.
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models
    # Le profil "train" evite que ce service one-shot demarre avec `up`.
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: todo/docker/Dockerfile.api
    # TODO (S14-1) : exposer le port 8000 (mapping "8000:8000")
    # TODO (S14-2) : monter le volume models_data en lecture seule sur
    #               /app/models (models_data:/app/models:ro) pour lire le modele
    #               produit par le service train
    # TODO (S14-3) : ajouter un healthcheck qui interroge GET /health, par ex :
    #   healthcheck:
    #     test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
    #     interval: 5s
    #     timeout: 5s
    #     retries: 10

  frontend:
    build:
      context: .
      dockerfile: todo/docker/Dockerfile.frontend
    # TODO (S14-4) : definir API_URL=http://api:8000 (resolution DNS interne par
    #               le nom de service `api`) dans environment
    # TODO (S14-5) : exposer le port 8501 (mapping "8501:8501")
    # TODO (S14-6) : attendre que l'API soit saine avant de demarrer :
    #   depends_on:
    #     api:
    #       condition: service_healthy

volumes:
  mlflow_data:
  models_data:
