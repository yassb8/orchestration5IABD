# Stack de prediction de l'abandon scolaire.
#
# Services : mlflow, train (profil "train"), api, frontend, airflow.
#
# Commandes :
#   docker compose up -d mlflow api frontend
#   docker compose --profile train run --rm train
#   docker compose up -d airflow
#   -> API       : http://localhost:8000
#   -> MLflow    : http://localhost:5000
#   -> Frontend  : http://localhost:8501
#   -> Airflow   : http://localhost:8080  (admin / voir logs au 1er demarrage)

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/mlflow.db
      # NE PAS definir MLFLOW_DEFAULT_ARTIFACT_ROOT ici : cela forcerait les
      # experiences a stocker un CHEMIN LOCAL (/mlflow/artifacts/N) que les
      # conteneurs clients (train/api/frontend) tentent d'ecrire sur LEUR propre
      # filesystem -> artefacts perdus. Avec --serve-artifacts seul, MLflow
      # utilise le schema proxifie mlflow-artifacts:/ : les clients uploadent
      # par HTTP et le serveur stocke dans --artifacts-destination.
      MLFLOW_DISABLE_ENV_MANAGER_CONDA_WARNING: "true"
      # CORS configuration pour accès public (à adapter selon l'IP réelle)
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "http://88.96.57.10:5000/"
      # Allowed hosts : IP publique (navigateur) + nom service Docker (conteneurs internes) + localhost (local)
      MLFLOW_SERVER_ALLOWED_HOSTS: "141.253.108.127:5000,mlflow:5000,localhost:5000,127.0.0.1:5000"
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT: student-dropout
      MODEL_NAME: dropout-classifier
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - models_data:/app/models:ro
    environment:
      MODEL_VERSION: "latest"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      - mlflow
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      MLFLOW_URL: http://mlflow:5000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    command: standalone
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      PYTHONPATH: /opt/airflow
      API_URL: http://api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT: student-dropout
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - airflow_data:/opt/airflow
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mlflow_data:
  models_data:
  airflow_data:
